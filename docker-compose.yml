services:
  eat:
    build: .
    expose:
      - "8000"
    networks:
      - coolify
    volumes:
      - eat-data:/data
    environment:
      - DB_PATH=/data/eat.db
      - PORT=8000
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  eat-data:
    external: true

networks:
  coolify:
    external: true
